  <!-- Life Lessons Header -->
  <header class="masthead">
    <div class="container px-4 px-lg-5 d-flex h-100 align-items-center justify-content-center">
      <div class="d-flex justify-content-center">
        <div class="text-center">
          <h1 class="mx-auto my-0 text-uppercase">Life Lessons</h1>
          <h2 class="text-white-50 mx-auto mt-2 mb-5">Insights I've Learned Along the Way</h2>
        </div>
      </div>
    </div>
  </header>
  
  <!-- Life Lessons Content Section -->
  <section class="projects-section bg-light">
    <div class="container px-4 px-lg-5">
      <div class="row gx-4 gx-lg-5 mb-4 justify-content-center">
        <div class="col-lg-8 text-center">
          <p class="lead">These are some of the important lessons I've learned throughout my life.</p>
        </div>

      <div class="row gx-4 gx-lg-5 justify-content-center">
        <div class="col-lg-10">
          <div class="lesson-boxes" id="lesson-container">

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  
  <!-- Core theme JS-->
  <script src="../assets/bootstrap/grayscale.js"></script>
  
  <!-- Custom scripts -->
  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/cursor-effects.js"></script>
  <script>
    // Load and display life lessons from lessons.json
    fetch('../data/lessons.json')
      .then(response => response.json())
      .then(lessons => {
        const container = document.getElementById('lesson-container');
        
        lessons.forEach(lesson => {
          const lessonBox = document.createElement('div');
          lessonBox.classList.add('lesson-box');
          lessonBox.classList.add('card');
          lessonBox.classList.add('mb-4');
          lessonBox.classList.add('shadow');
          
          const cardBody = document.createElement('div');
          cardBody.classList.add('card-body');
          
          const title = document.createElement('h3');
          title.classList.add('card-title');
          title.classList.add('mb-3');
          title.innerHTML = `<span class="badge bg-primary me-2">${lesson.id}</span>${lesson.title}`;
          
          const description = document.createElement('p');
          description.classList.add('card-text');
          description.textContent = lesson.description;
          
          cardBody.appendChild(title);
          cardBody.appendChild(description);
          lessonBox.appendChild(cardBody);
          container.appendChild(lessonBox);
        });
      })
      .catch(error => {
        console.error('Error loading life lessons:', error);
        document.getElementById('lesson-container').innerHTML = 
          '<div class="alert alert-danger">Failed to load life lessons. Please try again later.</div>';
      });
  </script>
</body>
