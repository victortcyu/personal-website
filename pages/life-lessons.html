<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life Lessons - Victor Yu</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles.css">
  <link rel="stylesheet" href="../assets/css/cursor-effects.css">
</head>
<body>
  <nav aria-label="Main navigation">
    <ul class="nav-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="research.html">Research</a></li>
      <li><a href="hobbies.html">Hobbies</a></li>
      <li><a href="life-lessons.html">Life Lessons</a></li>
    </ul>
    <button id="theme-toggle" aria-label="Toggle light/dark mode">Toggle Theme</button>
  </nav>
  <main>
    <section class="life-lessons">
      <h1>Life Lessons I've Learned</h1>
      <p>These are some of the important lessons I've learned throughout my life.</p>
      
      <div class="lesson-boxes" id="lesson-container">
        <!-- Lessons will be dynamically loaded from lessons.json -->
      </div>
    </section>
  </main>
  <footer>
    <ul class="social-links">
      <li><a href="#">GitHub</a></li>
      <li><a href="#">LinkedIn</a></li>
    </ul>
  </footer>
  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/cursor-effects.js"></script>
  <script>
    // Load and display life lessons from lessons.json
    fetch('../data/lessons.json')
      .then(response => response.json())
      .then(lessons => {
        const container = document.getElementById('lesson-container');
        
        lessons.forEach(lesson => {
          const lessonBox = document.createElement('div');
          lessonBox.classList.add('lesson-box');
          
          const title = document.createElement('h3');
          title.textContent = `${lesson.id}. ${lesson.title}`;
          
          const description = document.createElement('p');
          description.textContent = lesson.description;
          
          lessonBox.appendChild(title);
          lessonBox.appendChild(description);
          container.appendChild(lessonBox);
        });
      })
      .catch(error => {
        console.error('Error loading life lessons:', error);
        document.getElementById('lesson-container').innerHTML = 
          '<p>Failed to load life lessons. Please try again later.</p>';
      });
  </script>
</body>
</html>
